<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClickMont - Banner Facebook Cover</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', sans-serif;
      width: 820px;
      height: 312px;
      background: linear-gradient(135deg, #FF6B00 0%, #FF8C00 50%, #FFA500 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    
    .container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      padding: 30px 50px;
      position: relative;
    }
    
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    
    .logo-icon {
      width: 50px;
      height: 50px;
      background: white;
      border-radius: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    }
    
    .logo-icon span {
      font-size: 28px;
      font-weight: 900;
      color: #FF6B00;
    }
    
    .logo-text {
      font-size: 26px;
      font-weight: 800;
      color: white;
      letter-spacing: -0.5px;
    }
    
    .headline {
      font-size: 36px;
      font-weight: 900;
      color: white;
      line-height: 1.1;
      margin-bottom: 10px;
      text-shadow: 0 2px 20px rgba(0,0,0,0.15);
    }
    
    .subheadline {
      font-size: 14px;
      font-weight: 500;
      color: rgba(255,255,255,0.9);
      margin-bottom: 18px;
    }
    
    .cta {
      display: inline-block;
      background: white;
      color: #FF6B00;
      padding: 12px 28px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      transition: transform 0.3s ease;
      width: fit-content;
    }
    
    .cta:hover {
      transform: scale(1.05);
    }
    
    .visual {
      width: 220px;
      height: 220px;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }
    
    .visual-bg {
      position: absolute;
      width: 200px;
      height: 200px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
    }
    
    .visual-icon {
      width: 140px;
      height: 140px;
      background: white;
      border-radius: 35px;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      z-index: 1;
    }
    
    .visual-icon svg {
      width: 70px;
      height: 70px;
      fill: #FF6B00;
    }
    
    .badge {
      position: absolute;
      bottom: 0;
      left: 0;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      padding: 8px 16px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .badge svg {
      width: 16px;
      height: 16px;
      fill: #4CAF50;
    }
    
    .badge span {
      color: white;
      font-size: 11px;
      font-weight: 600;
    }
    
    .decoration {
      position: absolute;
      top: -50px;
      right: -50px;
      width: 200px;
      height: 200px;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="decoration"></div>
    
    <div class="content">
      <div class="logo">
        <div class="logo-icon">
          <span>M</span>
        </div>
        <span class="logo-text">ClickMont</span>
      </div>
      
      <h1 class="headline">Monte Seus Móveis<br>sem Estresse</h1>
      <p class="subheadline">Profissionais verificados • Garantia de serviço</p>
      <a href="#" class="cta">Solicitar Agora</a>
    </div>
    
    <div class="visual">
      <div class="visual-bg"></div>
      <div class="visual-icon">
        <svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>
      </div>
      <div class="badge">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
        <span>Verificados</span>
      </div>
    </div>
  </div>
</body>
</html>
